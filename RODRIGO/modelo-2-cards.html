<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelo 2 - Cards com secoes visuais</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); }

  .dialog { position: relative; z-index: 10; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; width: 100%; max-width: 640px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }

  .dialog-header { padding: 24px 24px 16px; border-bottom: 1px solid #2a2a2a; }
  .dialog-header h2 { font-size: 18px; font-weight: 600; }
  .dialog-header p { font-size: 12px; color: #888; margin-top: 2px; }

  .tabs { display: flex; gap: 4px; padding: 0 24px; margin-top: 12px; }
  .tab { padding: 8px 16px; font-size: 13px; border-radius: 6px; cursor: pointer; border: none; background: transparent; color: #888; transition: all 0.2s; }
  .tab:hover { color: #ccc; background: #222; }
  .tab.active { background: #fff; color: #000; font-weight: 500; }

  .content { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #ccc; margin-bottom: 6px; }
  .field input, .field select, .field textarea { width: 100%; padding: 9px 12px; font-size: 14px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fafafa; outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #555; }
  .field input::placeholder { color: #555; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }

  /* Cards de secao */
  .section-card { background: #141414; border: 1px solid #252525; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .section-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .section-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .section-icon.blue { background: #1e3a5f; color: #60a5fa; }
  .section-icon.green { background: #14532d; color: #4ade80; }
  .section-icon.orange { background: #431407; color: #fb923c; }
  .section-title { font-size: 13px; font-weight: 600; color: #aaa; }

  /* Checkboxes estilo toggle-card */
  .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .toggle-card { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .toggle-card:hover { border-color: #444; }
  .toggle-card.checked { border-color: #4ade80; background: rgba(74, 222, 128, 0.05); }
  .toggle-card input { display: none; }
  .toggle-dot { width: 16px; height: 16px; border: 2px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .toggle-card.checked .toggle-dot { background: #4ade80; border-color: #4ade80; }
  .toggle-card.checked .toggle-dot::after { content: ''; display: block; width: 4px; height: 8px; border: solid #000; border-width: 0 2px 2px 0; transform: rotate(45deg); margin-top: -2px; }
  .toggle-text { font-size: 12px; color: #bbb; line-height: 1.3; }
  .toggle-card.checked .toggle-text { color: #fff; }

  /* Slider */
  .slider-container { margin-bottom: 14px; }
  .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .slider-header label { font-size: 13px; font-weight: 500; color: #ccc; }
  .slider-value { font-size: 13px; font-weight: 600; color: #fff; background: #333; padding: 2px 10px; border-radius: 12px; }
  input[type="range"] { width: 100%; height: 6px; -webkit-appearance: none; background: #333; border-radius: 3px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #fff; border-radius: 50%; cursor: pointer; }
  .slider-labels { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-top: 4px; }

  .footer { padding: 16px 24px; border-top: 1px solid #2a2a2a; display: flex; justify-content: flex-end; gap: 10px; }
  .btn { padding: 9px 20px; font-size: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; transition: all 0.2s; }
  .btn-outline { background: transparent; border: 1px solid #333; color: #ccc; }
  .btn-outline:hover { background: #222; }
  .btn-primary { background: #fff; color: #000; }
  .btn-primary:hover { background: #ddd; }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="dialog">
  <div class="dialog-header">
    <h2>Novo Contato</h2>
    <p>Modelo 2 - Secoes agrupadas em cards visuais</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('pessoais')">Pessoais</button>
      <button class="tab" onclick="switchTab('endereco')">Endereco</button>
      <button class="tab" onclick="switchTab('redes')">Redes</button>
      <button class="tab" onclick="switchTab('obs')">Obs</button>
    </div>
  </div>

  <div class="content">
    <!-- PESSOAIS -->
    <div id="tab-pessoais" class="tab-panel active">

      <!-- Card: Dados basicos -->
      <div class="section-card">
        <div class="section-card-header">
          <div class="section-icon blue">&#128100;</div>
          <span class="section-title">Dados Basicos</span>
        </div>

        <div class="field">
          <label>Nome *</label>
          <input type="text" placeholder="Nome completo">
        </div>

        <div class="grid-2">
          <div class="field">
            <label>WhatsApp</label>
            <input type="text" placeholder="(00) 00000-0000">
          </div>
          <div class="field">
            <label>Telefone</label>
            <input type="text" placeholder="(00) 0000-0000">
          </div>
        </div>

        <div class="field">
          <label>E-mail</label>
          <input type="email" placeholder="email@exemplo.com">
        </div>

        <div class="grid-2">
          <div class="field">
            <label>Data de Nascimento</label>
            <input type="date">
          </div>
          <div class="field">
            <label>Genero</label>
            <select>
              <option value="">Selecione</option>
              <option>Masculino</option>
              <option>Feminino</option>
              <option>Outro</option>
              <option>Prefiro nao informar</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Card: Status e classificacao -->
      <div class="section-card">
        <div class="section-card-header">
          <div class="section-icon green">&#9745;</div>
          <span class="section-title">Status e Classificacao</span>
        </div>

        <div class="checkbox-grid">
          <label class="toggle-card" onclick="this.classList.toggle('checked')">
            <input type="checkbox">
            <span class="toggle-dot"></span>
            <span class="toggle-text">Ja esta no canal do WhatsApp</span>
          </label>
          <label class="toggle-card" onclick="this.classList.toggle('checked')">
            <input type="checkbox">
            <span class="toggle-dot"></span>
            <span class="toggle-text">E multiplicador</span>
          </label>
          <label class="toggle-card" onclick="this.classList.toggle('checked')">
            <input type="checkbox">
            <span class="toggle-dot"></span>
            <span class="toggle-text">Declarou voto</span>
          </label>
        </div>

        <div class="slider-container" style="margin-top: 8px;">
          <div class="slider-header">
            <label>Ranking</label>
            <span class="slider-value" id="ranking-val-2">0</span>
          </div>
          <input type="range" min="0" max="10" value="0" oninput="document.getElementById('ranking-val-2').textContent=this.value">
          <div class="slider-labels"><span>0</span><span>10</span></div>
        </div>

        <div class="field" style="margin-bottom: 0;">
          <label>Lideranca vinculada</label>
          <select>
            <option value="">Selecione uma lideranca</option>
            <option>Nenhuma</option>
            <option>Joao Silva</option>
            <option>Maria Santos</option>
          </select>
        </div>
      </div>

      <!-- Card: Etiquetas -->
      <div class="section-card">
        <div class="section-card-header">
          <div class="section-icon orange">&#127991;</div>
          <span class="section-title">Etiquetas</span>
        </div>
        <div class="grid-2" style="margin-bottom: 0;">
          <label class="toggle-card" onclick="this.classList.toggle('checked')" style="padding: 8px 10px;">
            <input type="checkbox">
            <span class="toggle-dot"></span>
            <span class="toggle-text" style="color: #f87171;">Prioridade Alta</span>
          </label>
          <label class="toggle-card" onclick="this.classList.toggle('checked')" style="padding: 8px 10px;">
            <input type="checkbox">
            <span class="toggle-dot"></span>
            <span class="toggle-text" style="color: #60a5fa;">Comunidade</span>
          </label>
          <label class="toggle-card" onclick="this.classList.toggle('checked')" style="padding: 8px 10px;">
            <input type="checkbox">
            <span class="toggle-dot"></span>
            <span class="toggle-text" style="color: #4ade80;">Apoiador</span>
          </label>
          <label class="toggle-card" onclick="this.classList.toggle('checked')" style="padding: 8px 10px;">
            <input type="checkbox">
            <span class="toggle-dot"></span>
            <span class="toggle-text" style="color: #facc15;">Evento</span>
          </label>
        </div>
      </div>

    </div>

    <!-- ENDERECO -->
    <div id="tab-endereco" class="tab-panel">
      <div class="section-card">
        <div class="field"><label>Logradouro</label><input placeholder="Rua, Avenida..."></div>
        <div class="grid-2">
          <div class="field"><label>Numero</label><input></div>
          <div class="field"><label>Complemento</label><input placeholder="Apto, Bloco..."></div>
        </div>
        <div class="grid-2">
          <div class="field"><label>Bairro</label><input></div>
          <div class="field"><label>Cidade</label><input></div>
        </div>
        <div class="grid-2">
          <div class="field"><label>Estado</label><select><option>UF</option></select></div>
          <div class="field"><label>CEP</label><input placeholder="00000-000"></div>
        </div>
      </div>
    </div>

    <!-- REDES -->
    <div id="tab-redes" class="tab-panel">
      <div class="section-card">
        <div class="field"><label>Instagram</label><input placeholder="@usuario"></div>
        <div class="field"><label>Twitter / X</label><input placeholder="@usuario"></div>
        <div class="field"><label>TikTok</label><input placeholder="@usuario"></div>
        <div class="field"><label>YouTube</label><input placeholder="Canal ou URL"></div>
      </div>
    </div>

    <!-- OBS -->
    <div id="tab-obs" class="tab-panel">
      <div class="section-card">
        <div class="field"><label>Origem</label><input placeholder="Ex: Indicacao, Evento..."></div>
        <div class="field"><label>Observacoes</label><textarea rows="4" placeholder="Observacoes gerais sobre o contato..."></textarea></div>
        <div class="field"><label>Notas do Assessor</label><textarea rows="4" placeholder="Notas internas da assessoria..."></textarea></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn btn-outline">Cancelar</button>
    <button class="btn btn-primary">Criar Contato</button>
  </div>
</div>

<script>
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}
</script>
</body>
</html>
